# Sync D3 pitching leaderboard daily so player profiles have current game data.
# Runs at 6:00 AM UTC (1:00 AM ET) every day.
name: Sync D3 Leaderboard

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync D3 leaderboard
        env:
          D3_DASHBOARD_API_KEY: ${{ secrets.D3_DASHBOARD_API_KEY }}
        run: python3 scripts/sync_d3_leaderboard.py --years 2025

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet web/public/d3/; then
            echo "No changes to D3 cache"
          else
            git add web/public/d3/
            git commit -m "chore: sync D3 leaderboard $(date -u +%Y-%m-%d)"
            git push
          fi
